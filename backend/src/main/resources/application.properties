spring.application.name=Delissa

# Railway asigna un puerto dinámico
server.port=${PORT:8080}

# MySQL — Railway inyecta estas vars automáticamente
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:delissa}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:654321}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Connection pool (necesario en producción)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1